  <ellipse cx="18.2" cy="13" rx="1.2" ry="1.1" fill="#4A2E1A"/>
  <!-- lucine occhi -->
  <circle cx="14.2" cy="12.6" r="0.3" fill="white" opacity=".7"/>
  <circle cx="18.6" cy="12.6" r="0.3" fill="white" opacity=".7"/>

  <!-- naso -->
  <path d="M16 14 Q15.2 16 15.5 16.5 Q16 17 16.5 16.5 Q16.8 16 16 14Z" fill="#C4987A" opacity=".7"/>

  <!-- barba corta — mascella e mento -->
