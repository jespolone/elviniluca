  <!-- testa -->
  <ellipse cx="16" cy="13" rx="7" ry="7.5" fill="#D4A882"/>

  <!-- capelli — massa scura -->
  <path d="M9 11 Q9 4 16 4 Q23 4 23 11 Q22 7 16 7 Q10 7 9 11Z" fill="#2C1A0E"/>

  <!-- ciuffo in avanti caratteristico -->
